<!DOCTYPE html>
<html>
<head>
    <title>Student Registration Form</title>
</head>
<body>

<center>
    <h2>Student Registration Form</h2>
</center>

<form>

    <label>First Name:</label><br>
    <input type="text" placeholder="Enter First Name" required><br><br>

    <label>Last Name:</label><br>
    <input type="text" placeholder="Enter Last Name" required><br><br>

    <label>Roll No:</label><br>
    <input type="text" placeholder="Enter Roll No" required><br><br>

    <label>Gender:</label><br>
    <input type="radio" name="gender" required> Male
    <input type="radio" name="gender"> Female<br><br>

    <label>Department:</label><br>
    <select required>
        <option value="">Select Department</option>
        <option>CS</option>
        <option>Psychology</option>
        <option>English</option>
    </select><br><br>

    <label>Semester:</label><br>
    <select required>
        <option value="">Select Semester</option>
        <option>1st Semester</option>
        <option>2nd Semester</option>
        <option>3rd Semester</option>
        <option>4th Semester</option>
        <option>5th Semester</option>
        <option>6th Semester</option>
        <option>7th Semester</option>
        <option>8th Semester</option>
    </select><br><br>

    <label>Email:</label><br>
    <input type="email" placeholder="Enter Email" required><br><br>

    <label>Phone Number:</label><br>
    <input type="tel" placeholder="Enter Phone Number" required><br><br>

    <label>Address:</label><br>
    <textarea rows="4" cols="30" placeholder="Enter Address" required></textarea><br><br>

    <input type="submit" value="Submit">
    <input type="reset" value="Reset">

</form>

</body>
</html>
